<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dear Traveler — Tourifique</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0533 0%, #2d0a5e 40%, #4a1a8a 70%, #2d0a5e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  .scene {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 220, 50, 0.15);
    animation: floatP 6s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes floatP {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.15; }
    50% { transform: translateY(-20px) scale(1.1); opacity: 0.3; }
  }

  /* ── Envelope stack ── */
  .envelope-wrapper {
    position: relative;
    width: 340px;
    height: 240px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .envelope-wrapper.open {
    transform: translateY(60px);
  }

  /* Layer order (bottom → top):
     1. env-back   — body + side folds         z:1
     2. note       — the rising letter          z:2
     3. env-front  — bottom fold overlay        z:3
     4. env-flap   — top flap (goes behind)     z:4 → z:1 when open
  */

  .env-back,
  .env-front,
  .env-flap {
    position: absolute;
    top: 0; left: 0;
    width: 340px;
    height: 240px;
    pointer-events: none;
  }

  .env-back  { z-index: 1; }
  .env-front { z-index: 3; }

  /* Flap starts on top (z:4), goes behind when open (z:0) */
  .env-flap {
    z-index: 4;
    transition: z-index 0s 0s; /* instant swap handled in JS */
  }

  .envelope-wrapper:hover .env-back {
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.55));
  }

  /* ── Note (the letter) ── */
  .note {
    position: absolute;
    left: 50%;
    bottom: 60%;
    width: 290px;
    background: #fffdf4;
    border-radius: 4px;
    padding: 26px 26px 22px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.3);
    z-index: 2;
    opacity: 0;
    pointer-events: none;
    border-top: 4px solid #f5c842;
    /* start: translated down so it's hidden inside envelope */
    transform: translateX(-50%) translateY(90px);
    transition:
      transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94),
      opacity   0.5s ease;
  }

  .note.visible {
    opacity: 1;
    pointer-events: all;
    transform: translateX(-50%) translateY(-20px);
  }

  /* ── Flap animation ── */
  #flap-poly-group {
    transform-origin: 170px 62px; /* top-center of flap */
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .envelope-wrapper.open #flap-poly-group {
    transform: rotateX(180deg) scaleY(-1) translateY(-2px);
  }

  /* lined paper effect */
  .note-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 4px;
  }
  .note-lines::after {
    content: '';
    position: absolute;
    top: 70px; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 27px,
      rgba(90, 40, 160, 0.08) 27px, rgba(90, 40, 160, 0.08) 28px
    );
  }

  .note-header {
    font-size: 21px;
    font-weight: bold;
    color: #3b1870;
    margin-bottom: 14px;
    font-style: italic;
    border-bottom: 1px solid rgba(90, 40, 160, 0.2);
    padding-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .question-block { margin-bottom: 16px; }

  .question-label {
    font-size: 13px;
    color: #4a2080;
    margin-bottom: 9px;
    line-height: 1.5;
    font-style: italic;
  }

  .radio-group { display: flex; gap: 16px; }

  .radio-option {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    font-size: 13px;
    color: #2a0a50;
  }

  .radio-option input[type="radio"] {
    accent-color: #7c3aed;
    width: 15px; height: 15px;
    cursor: pointer;
  }

  .submit-btn {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: #f5c842;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-family: 'Georgia', serif;
    font-style: italic;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 10px rgba(90, 40, 160, 0.4);
  }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(90,40,160,0.5); }
  .submit-btn:active { transform: scale(0.98); }

  .success-msg {
    display: none;
    text-align: center;
    color: #7c3aed;
    font-size: 13px;
    font-style: italic;
    margin-top: 10px;
  }
  .success-msg.show { display: block; }

  /* hint */
  .hint {
    position: absolute;
    bottom: -36px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(245, 200, 66, 0.6);
    font-size: 13px;
    font-style: italic;
    white-space: nowrap;
    letter-spacing: 0.5px;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .envelope-wrapper.open .hint { opacity: 0; }

  /* wax seal pulse */
  @keyframes sealPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.72; }
  }
  #seal { animation: sealPulse 3s ease-in-out infinite; }
  .envelope-wrapper.open #seal { animation: none; opacity: 0; transition: opacity 0.25s; }
</style>
</head>

      <!-- stars -->

      <div class="note-header">Dear Traveler,</div>

      <div class="question-block">
        <div class="question-label">Will you be joining us on the journey ahead?</div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="q1" value="yes"> Yes</label>
          <label class="radio-option"><input type="radio" name="q1" value="no"> No</label>
        </div>
      </div>

      <div class="question-block">
        <div class="question-label">Have you prepared for what lies beyond?</div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="q2" value="yes"> Yes</label>
          <label class="radio-option"><input type="radio" name="q2" value="no"> No</label>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn">Send your reply ✦</button>
      <div class="success-msg" id="successMsg">Your reply has been sealed and sent ✦</div>
    </div>

    <!-- LAYER 3 — bottom fold (always on top of the note) -->
    <svg class="env-front" viewBox="0 0 340 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bottomFold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d8b4fe"/>
          <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
      </defs>
      <!-- bottom triangle fold — covers the bottom of the note -->
      <polygon points="10,230 170,140 330,230" fill="url(#bottomFold)" stroke="#9333ea" stroke-width="1"/>
      <!-- star at bottom -->
      <text x="160" y="222" font-size="10" fill="#f5c842" opacity="0.5" font-family="serif">✦</text>
      <!-- wax seal -->
      <g id="seal">
        <circle cx="170" cy="152" r="22" fill="#f5c842" stroke="#d97706" stroke-width="1.5"/>
        <circle cx="170" cy="152" r="17" fill="none" stroke="#92400e" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="170" y="157" text-anchor="middle" font-size="14" fill="#7c2d12" font-family="serif" font-weight="bold">✦</text>
      </g>
    </svg>

    <!-- LAYER 4 — flap (top triangle, goes behind note when open) -->
    <svg class="env-flap" id="envFlap" viewBox="0 0 340 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="flapGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c084fc"/>
          <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
      </defs>
      <g id="flap-poly-group">
        <polygon points="10,62 330,62 170,148" fill="url(#flapGrad)" stroke="#9333ea" stroke-width="1.5"/>
        <line x1="10" y1="62" x2="330" y2="62" stroke="#7e22ce" stroke-width="1" opacity="0.4"/>
      </g>
    </svg>

    <div class="hint">click to open</div>
  </div>
</div>

<script>
  const wrapper    = document.getElementById('envelopeWrapper');
  const note       = document.getElementById('note');
  const envFlap    = document.getElementById('envFlap');
  const submitBtn  = document.getElementById('submitBtn');
  const successMsg = document.getElementById('successMsg');
  const innerShade = document.getElementById('innerShade');
  let isOpen = false;

  wrapper.addEventListener('click', function(e) {
    if (note.contains(e.target)) return;
    isOpen = !isOpen;
    wrapper.classList.toggle('open', isOpen);
    note.classList.toggle('visible', isOpen);
    innerShade.style.opacity = isOpen ? '0.3' : '0';

    // Swap flap z-index: behind note when open, in front when closed
    // Delay the z-index drop so the flip animation is visible first
    if (isOpen) {
      setTimeout(() => { envFlap.style.zIndex = '0'; }, 220);
    } else {
      envFlap.style.zIndex = '4';
    }
  });

  submitBtn.addEventListener('click', function() {
    const q1 = document.querySelector('input[name="q1"]:checked');
    const q2 = document.querySelector('input[name="q2"]:checked');
    if (!q1 || !q2) {
      submitBtn.textContent = 'Please answer both questions ✦';
      submitBtn.style.background = 'linear-gradient(135deg, #be185d, #9d174d)';
      setTimeout(() => {
        submitBtn.textContent = 'Send your reply ✦';
        submitBtn.style.background = 'linear-gradient(135deg, #7c3aed, #5b21b6)';
      }, 2000);
      return;
    }
    submitBtn.style.display = 'none';
    successMsg.classList.add('show');
    document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
  });
</script>
